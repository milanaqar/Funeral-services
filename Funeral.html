       <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3 Flashcards Carousel</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .flashcard {
      width: 100%;
      height: 260px;
      perspective: 1000px;
      cursor: pointer;
    }

    .flashcard-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
      border-radius: 15px;
      overflow: hidden;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .flashcard-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
      border-radius: 15px;
      color: white;
      font-size: 1.2rem;
    }

    .front {
      background: #0d6efd;
    }

    .back {
      background: #198754;
      transform: rotateY(180deg);
    }
  </style>
</head>

<body class="bg-dark text-light p-5">

<div id="cardCarousel" class="carousel slide mx-auto" style="max-width: 400px;">
  <div class="carousel-inner">

    <!-- Card 1 -->
    <div class="carousel-item active">
      <div class="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-face front">
            HTML<br>Click to see answer
          </div>
          <div class="flashcard-face back">
            HyperText Markup Language
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="carousel-item">
      <div class="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-face front">
            CSS<br>Click to see answer
          </div>
          <div class="flashcard-face back">
            Cascading Style Sheets
          </div>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="carousel-item">
      <div class="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-face front">
            JavaScript<br>Click to see answer
          </div>
          <div class="flashcard-face back">
            Adds interactivity to websites
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Arrows -->
  <button class="carousel-control-prev" type="button" data-bs-target="#cardCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#cardCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Flip card on click
  document.querySelectorAll('.flashcard').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('flipped');
    });
  });
</script>

</body>
</html>
