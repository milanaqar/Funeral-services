<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Funeral Services</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<body>
    <header>
         <img src="funeral_logo_witout_background.png" alt="Funeral Services Logo" width="160" height="100">
                  <a href="Funeral.html" class="search-btn">Search Services</a>
				  <a href="ourservices.html" class="search-btn" data-key="nav_services">Our Services</a>
		 <a href="contact.html" class="search-btn" data-key="nav_contact">Contact Us</a>
         
		 <div class="lang-container">
			<button class="search-btn" onclick="changeLanguage('el')">Ελληνικά</button>
			<button class="search-btn" onclick="changeLanguage('en')">English</button>
		 </div>
         <hr>
    </header>

    <main>

        <section class="contact_form container mt-5">
    <h2 class="mb-4">Contact Us</h2>

    <form action="submit_form.php" method="post" class="p-4 border rounded shadow-sm bg-light">

        <div class="mb-3">
            <label for="name" class="form-label">Full Name:</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number:</label>
            <input type="tel" id="phone" name="phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Choose Service:</label>
            <select id="email" name="email" class="form-select" required>
                <option value="basic">Basic</option>
                <option value="premium">Premium</option>
                <option value="exclusive">Exclusive</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="date" class="form-label">Service Date:</label>
            <input type="date" id="date" name="date" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="message" class="form-label">Message:</label>
            <textarea id="message" name="message" class="form-control" rows="3" required></textarea>
        </div>

        <p id="servicePrice" class="fw-bold"></p>
        <p id="serviceInfo"></p>
        <p id="namePreview" class="text-primary"></p>

        <button type="submit" class="btn btn-dark w-100 mt-3">Pay Now</button>
    </form>
</section>
    </main>

    <footer>
        <hr>
        <a href="https://youtube.com/digitalfuneralservices" target="_blank">YouTube</a>
        <a href="https://facebook.com/digitalfuneralservices" target="_blank">Facebook</a>
        <a href="https://instagram.com/digitalfuneralservices" target="_blank">Instagram</a>
        <p>&copy; 2024 Digital Funeral Services. All rights reserved.</p>
    </footer>
	<script src="diglosso.js"></script>
    <script>

const services = {
    basic: {
        price: 1000,
        description: "Basic funeral services for those seeking a simple and respectful farewell."
    },
    premium: {
        price: 5000,
        description: "Premium funeral services for those wanting a more elaborate and personalized tribute."
    },
    exclusive: {
        price: 10000,
        description: "Exclusive funeral services for those seeking a unique and memorable farewell."
    }
};

document.addEventListener("DOMContentLoaded", () => 
{
    const form = document.querySelector("form");
    const submitButton = form.querySelector("button[type='submit']");
    
    const nameInput = document.getElementById("name");
    const phoneInput = document.getElementById("phone"); 
    const dateInput = document.getElementById("date");  
    const serviceSelect = document.getElementById("email");

    const priceBox = document.getElementById("servicePrice");
    const infoBox = document.getElementById("serviceInfo");
    const namePreview = document.getElementById("namePreview");

    //  NAME VALIDATION > 5 characters
    nameInput.addEventListener("input", () => 
    {
        const name = nameInput.value.trim();

        if (name.length > 5) 
        {
            namePreview.textContent = "Hello, " + name + "!";
            
        }
         else 
        {
            namePreview.textContent = "Please enter a full name (more than 5 characters).";
            namePreview.style.color = "red";
        }
    });

    //  GREEK PHONE VALIDATION 
    phoneInput.addEventListener("input", () => 
    {
        const phone = phoneInput.value.trim();

        const greekPhonePattern = /^\+30\s69\d{8}$/;

        if (greekPhonePattern.test(phone)) 
        {
            phoneInput.style.border = "2px solid green";
            phoneInput.setCustomValidity("");
        }
         else 
        {
            phoneInput.style.border = "2px solid red";
            phoneInput.setCustomValidity("Phone must be in format: +30 69XXXXXXXX");
        }
    });

    // DATE VALIDATION MUST BE IN THE FUTURE
    dateInput.addEventListener("input", () => 
    {
        const selectedDate = new Date(dateInput.value);
        const today = new Date();

        if (selectedDate > today) 
        {
            dateInput.style.border = "2px solid green";
            dateInput.setCustomValidity("");
        } 
        else 
        {
            dateInput.style.border = "2px solid red";
        }
    });

    //  SHOW SERVICE PRICE + DESCRIPTION
    serviceSelect.addEventListener("change", () => 
    {
        const selected = services[serviceSelect.value];
        priceBox.textContent = "Price: €" + selected.price;
        infoBox.textContent = "Includes: " + selected.description;
    });

    // CHANGE BUTTON TEXT
    form.addEventListener("submit", (e) => 
    {
      e.preventDefault();

       if (!form.checkValidity()) 
       { 
            return;
        } 
       
        submitButton.textContent = "Processing Payment...";

        submitButton.disabled = true;
    });

  });
</script>

</body>
</html>
